[env:cyd]
extends = esp32_base
board = esp32dev
monitor_filters = esp32_exception_decoder
build_src_filter = 
  ${esp32_base.build_src_filter}
  +<../variants/esp32/cyd>
build_flags = 
  ${esp32_base.build_flags} -I variants/esp32/cyd
  -DPRIVATE_HW -DCYD_DEVICE
  -DDISABLE_ALL_LIBRARY_WARNINGS
  -DMESHTASTIC_EXCLUDE_AIR_QUALITY_SENSOR=1
  -DMESHTASTIC_EXCLUDE_GPS=1  

lib_deps = 
  ${esp32_base.lib_deps}
  lovyan03/LovyanGFX@^1.2.0

upload_speed = 115200