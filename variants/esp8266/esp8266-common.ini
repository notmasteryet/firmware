; Common settings for ESP8266-based LoRa nodes
; Minimal build: SX1262 radio + serial mesh API only, no BLE/WiFi/screen/GPS/sensors
[esp8266_base]
extends = arduino_base
platform = espressif8266@4.2.1
framework = arduino

build_src_filter =
  ${arduino_base.build_src_filter}
  -<platform/esp32/>
  -<platform/nrf52/>
  -<platform/stm32wl/>
  -<platform/rp2xx0/>
  -<platform/portduino/>
  -<platform/extra_variants/>
  -<mesh/http/>
  -<mesh/eth/>
  -<mesh/raspihttp/>
  -<mesh/api/WiFiServerAPI.cpp>
  -<mesh/api/ethServerAPI.cpp>
  -<mesh/wifi/>
  -<modules/esp32/>
  -<modules/audio/>
  -<modules/Telemetry/>
  -<modules/ExternalNotificationModule.cpp>
  -<modules/RangeTestModule.cpp>
  -<modules/CannedMessageModule.cpp>
  -<modules/WaypointModule.cpp>
  -<modules/StoreForwardModule.cpp>
  -<modules/NeighborInfoModule.cpp>
  -<modules/KeyVerificationModule.cpp>
  -<modules/TrafficManagementModule.cpp>
  -<modules/GenericThreadModule.cpp>
  -<modules/OnScreenKeyboardModule.cpp>
  -<detect/ScanI2CTwoWire.cpp>
  -<detect/reClockI2C.cpp>
  -<graphics/>
  -<gps/GPS.cpp>
  -<gps/GPSUpdateScheduling.cpp>
  -<gps/NMEAWPL.cpp>
  -<motion/>
  -<mqtt/>
  -<nimble/>
  -<input/>
  +<platform/esp8266/>

build_flags =
  ${arduino_base.build_flags}
  -Isrc/platform/esp8266
  ; Feature exclusions
  -DMESHTASTIC_EXCLUDE_BLUETOOTH=1
  -DMESHTASTIC_EXCLUDE_WIFI=1
  -DMESHTASTIC_EXCLUDE_WEBSERVER=1
  -DMESHTASTIC_EXCLUDE_SCREEN=1
  -DMESHTASTIC_EXCLUDE_GPS=1
  -DMESHTASTIC_EXCLUDE_AUDIO=1
  -DMESHTASTIC_EXCLUDE_ACCELEROMETER=1
  -DMESHTASTIC_EXCLUDE_PAXCOUNTER=1
  -DMESHTASTIC_EXCLUDE_RANGETEST=1
  -DMESHTASTIC_EXCLUDE_ATAK=1
  -DMESHTASTIC_EXCLUDE_ENVIRONMENTAL_SENSOR=1
  -DMESHTASTIC_EXCLUDE_POWER_TELEMETRY=1
  -DMESHTASTIC_EXCLUDE_TRACEROUTE=1
  -DMESHTASTIC_EXCLUDE_I2C=1
  -DMESHTASTIC_EXCLUDE_INPUTBROKER=1
  -DMESHTASTIC_EXCLUDE_EXTERNALNOTIFICATION=1
  -DMESHTASTIC_EXCLUDE_MQTT=1
  -DMESHTASTIC_EXCLUDE_WAYPOINT=1
  -DMESHTASTIC_EXCLUDE_NEIGHBORINFO=1
  -DMESHTASTIC_EXCLUDE_PKI=1
  -DMESHTASTIC_EXCLUDE_CANNEDMESSAGES=1
  -DMESHTASTIC_EXCLUDE_STOREFORWARD=1
  -DMESHTASTIC_EXCLUDE_DETECTIONSENSOR=1
  ; Packet pool sizes — keep small to save static RAM
  -DMAX_RX_TOPHONE=4
  -DMAX_TX_QUEUE=4
  -DMAX_RX_FROMRADIO=2
  -DMAX_RX_MQTTPROXY_TOPHONE=1
  -DMAX_MQTT_PROXY_MESSAGES=1
  -DMAX_CLIENT_NOTIFICATIONS=1
  ; NodeDB: 6 nodes (~1.3 KB heap vs ~3.3 KB for 15 or ~22 KB for 100)
  -DMAX_NUM_NODES=6
  ; PacketHistory: 20 records × 20 bytes = 400 bytes vs default min 100 × 20 = 2000 bytes
  ; Hash table skipped (O(N) scan is fine for N=20)
  -DPACKETHISTORY_MAX=20
  -DMESHTASTIC_EXCLUDE_PKT_HISTORY_HASH=1
  ; Enable secondary IRAM heap: switch to 16KB iCACHE + 48KB IRAM (shared heap).
  ; The build system sets MMU_IRAM_SIZE=0xC000 + MMU_IRAM_HEAP from this flag.
  ; mmu_sec_heap() returns unused IRAM above _text_end (~10-20 KB with -Os).
  ; operator new falls back to it when DRAM heap is exhausted (see main-esp8266.cpp).
  ; LittleFS begin() also directs its internal caches there.
  -D PIO_FRAMEWORK_ARDUINO_MMU_CACHE16_IRAM48_SECHEAP_SHARED
  ; Wrap malloc/calloc/realloc so IRAM heap is tried on DRAM exhaustion.
  ; Covers operator new (which calls malloc internally in Arduino abi.cpp).
  -Wl,-wrap=malloc
  -Wl,-wrap=calloc
  -Wl,-wrap=realloc
  -Os

lib_deps =
  ${arduino_base.lib_deps}
  ${radiolib_base.lib_deps}
  # renovate: datasource=custom.pio depName=rweather/Crypto packageName=rweather/library/Crypto
  rweather/Crypto@0.4.0

board_build.filesystem = littlefs

lib_ignore =
  segger_rtt
  NimBLE-Arduino
  ESP32 BLE Arduino
  XPowersLib
  libpax
  Wire
  Ethernet
