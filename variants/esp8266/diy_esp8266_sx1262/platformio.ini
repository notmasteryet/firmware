; DIY ESP8266 (D1 Mini / NodeMCU) + SX1262 LoRa node
; Wiring (adjust pins in variant.h if different):
;   SCK  = D5 / GPIO14    MISO = D6 / GPIO12
;   MOSI = D7 / GPIO13    CS   = D8 / GPIO15
;   DIO1 = D1 / GPIO5     RST  = D2 / GPIO4
;   BUSY = D0 / GPIO16
[env:diy_esp8266_sx1262]
extends = esp8266_base
board = d1_mini
build_flags =
  ${esp8266_base.build_flags}
  -I variants/esp8266/diy_esp8266_sx1262
