[env:cyd]
extends = esp32_base
board = esp32dev
monitor_filters = esp32_exception_decoder
build_src_filter = 
  ${esp32_base.build_src_filter}
  +<../variants/cyd>
build_flags = 
  ${esp32_base.build_flags} -I variants/cyd
  -DPRIVATE_HW -DCYD_DEVICE
  -DDISABLE_ALL_LIBRARY_WARNINGS
lib_deps = 
  ${esp32_base.lib_deps}
  lovyan03/LovyanGFX@^1.2.0
