[env:blackpill]
extends = stm32_base
board = blackpill_f411ce
board_upload.maximum_size = 393216 ; reserve the last 128KB for storage

lib_deps =
  ${stm32_base.lib_deps}
build_flags = 
  ${stm32_base.build_flags}
  -I variants/stm32/blackpill
  -DUSBCON
  -DPIO_FRAMEWORK_ARDUINO_ENABLE_CDC
  -DDISABLE_WL_IN_STM32
  -DDISABLE_SPI_FLASH_IN_STM32
  -DSERIAL_UART_INSTANCE=1
  -DPIN_SERIAL_RX=PB7
  -DPIN_SERIAL_TX=PB6
  -DMESHTASTIC_EXCLUDE_ENVIRONMENTAL_SENSOR=1
  -DMESHTASTIC_EXCLUDE_AIR_QUALITY_SENSOR=1
  -DMESHTASTIC_EXCLUDE_POWER_TELEMETRY=1
  -DMESHTASTIC_EXCLUDE_GPS=1
  -DRADIOLIB_EXCLUDE_SX128X=1
  -DRADIOLIB_EXCLUDE_SX127X=1
  -DRADIOLIB_EXCLUDE_LR11X0=1
  ;-UDEBUG_MUTE

monitor_dtr = 1
